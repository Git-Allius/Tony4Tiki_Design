<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony4Tiki | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <!-- Navigation Bar -->
            <div class="navbar">
                <div class="logo">
                    <a href="index.html"><img src="images/logo.png" width="150px"></a>
                </div>
                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="drinks.html">Drinks</a></li>
                        <li><a href="gallery.html">Gallery</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
                <div class="nav-icons">
                    <a href="account.html"><img src="images/profile_icon.png"></a>
                    <a href="cart.html"><img src="images/cart_icon.png"></a>
                    <img src="images/menu_icon.png" class="menu-icon" onclick="toggleMenu()">
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="account-page">
            <div class="small-container">
                <h2 class="title">Account</h2>

                <div class="account-box">

                    <div class="form-toggle">
                        <div class="toggle-slider" id="toggleSlider"></div>
                        <button
                            id="loginToggle"
                            class="active"
                            onclick="showLogin()">
                            Login
                        </button>
                        <button
                            id="registerToggle"
                            onclick="showRegister()">
                            Register
                        </button>
                    </div>

                    <form id="loginForm" class="account-form" onsubmit="loginUser(event)">
                        <input type="text" id="loginUsername" placeholder="Username" required>
                        <input type="password" id="loginPassword" placeholder="Password" required>

                        <button type="submit" class="btn account-btn">Login</button>
                    </form>

                    <form id="registerForm" class="account-form hidden" onsubmit="registerUser(event)">
                        <input type="text" id="registerUsername" placeholder="Username" required>
                        <input type="email" id="registerEmail" placeholder="Email Address" required>
                        <input type="password" id="registerPassword" placeholder="Password" required>

                        <button type="submit" class="btn account-btn">Register</button>
                    </form>

                    <div id="accountMessage"></div>

                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="small-container">

            <div class="footer-logo">
                <img src="images/logo.png" alt="Tony4Tiki Logo">
            </div>

            <p class="footer-description">
                Craft cocktails, tiki recipes, and island-inspired drinks.
            </p>

            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="drinks.html">Drinks</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>

            <div class="footer-socials">
                <a href="https://www.instagram.com/tony4tiki">Instagram</a>
                <a href="https://www.tiktok.com/@tony4tiki">TikTok</a>
            </div>

            <p class="footer-responsibility">
                Please enjoy responsibly.
            </p>

            <p class="footer-copyright">
                © 2026 Tony4Tiki. All Rights Reserved.
            </p>

        </div>
    </footer>
</body>
</html>

<!-- JavaScript -->
<script src="script.js"></script>
