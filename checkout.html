<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony4Tiki | Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <!-- Navigation Bar -->
            <div class="navbar">
                <div class="logo">
                    <a href="index.html"><img src="images/logo.png" width="150px"></a>
                </div>
                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="drinks.html">Drinks</a></li>
                        <li><a href="gallery.html">Gallery</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
                <div class="nav-icons">
                    <a href="account.html"><img src="images/profile_icon.png"></a>
                    <a href="cart.html"><img src="images/cart_icon.png"></a>
                    <img src="images/menu_icon.png" class="menu-icon" onclick="toggleMenu()">
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="checkout-page">
            <div class="small-container">
                <h2 class="title">Checkout</h2>

                <div class="checkout-container">

                    <form class="checkout-form" onsubmit="placeOrder(event)">
                        <h3>Order Information</h3>

                        <input type="text" id="customerName" placeholder="Full Name" required>
                        <input type="tel" id="customerPhone" placeholder="Phone Number" required>
                        <input type="email" id="customerEmail" placeholder="Email Address" required>

                        <textarea id="orderNotes" placeholder="Order notes, pickup details, or special requests"></textarea>

                        <button type="submit" class="btn checkout-submit">
                            Place Order
                        </button>
                    </form>

                    <div class="checkout-summary">
                        <h3>Order Summary</h3>

                        <div id="checkoutItems"></div>

                        <div class="checkout-total">
                            <span>Total</span>
                            <strong id="checkoutTotal">$0.00</strong>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="small-container">

            <div class="footer-logo">
                <img src="images/logo.png" alt="Tony4Tiki Logo">
            </div>

            <p class="footer-description">
                Craft cocktails, tiki recipes, and island-inspired drinks.
            </p>

            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="drinks.html">Cocktails</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>

            <div class="footer-socials">
                <a href="https://instagram.com">Instagram</a>
                <a href="https://tiktok.com">TikTok</a>
            </div>

            <p class="footer-responsibility">
                Please enjoy responsibly.
            </p>

            <p class="footer-copyright">
                © 2026 Tony4Tiki. All Rights Reserved.
            </p>

        </div>
    </footer>
</body>
</html>

<!-- JavaScript -->
<script src="script.js"></script>
